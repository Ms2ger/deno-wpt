# This CI job runs every night and tests all versions of Deno (canary and latest
# stable) across all OSes we support against the `epochs/daily` branch of WPT.

name: wpt_epoch2

on:
  #schedule:
    # Every night at 0:30 UTC. This is 20 minutes after `epochs/daily` branch is
    # triggered to be created in WPT repo.
  #  - cron: 30 0 * * *
  workflow_dispatch:
  push:

jobs:
  wpt:
    name: wpt / ${{ matrix.runtime}}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - runtime: node-latest
            node-version: latest
            deno-version: latest
          # - runtime: node-nightly
          #   node-version: nightly
          #   deno-version: latest
          - runtime: deno-latest
            deno-version: latest
          - runtime: deno-canary
            deno-version: canary

    steps:
      - name: Clone repository
        uses: actions/checkout@v6

      - name: Set env.WPT_REVISION
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "WPT_REVISION=$(gh api /repos/web-platform-tests/wpt/branches/epochs/daily --jq '.commit.sha')" >> $GITHUB_ENV

      - name: Clone wpt
        uses: actions/checkout@v6
        with:
          repository: 'web-platform-tests/wpt'
          submodules: true
          persist-credentials: false
          path: wpt
          ref: ${{ env.WPT_REVISION }}

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ matrix.deno-version }}

      - uses: actions/setup-node@v6
        if: ${{ matrix.node-version }}
        with:
          # Version Spec of the version to use in SemVer notation.
          # It also admits such aliases as lts/*, latest, nightly and canary builds
          # Examples: 12.x, 10.15.1, >=10.15.0, lts/Hydrogen, 16-nightly, latest, node
          node-version: ${{ matrix.node-version }}

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Log versions
        run: |
          python --version
          node --version
          deno --version

      - name: Create MANIFEST.json
        working-directory: wpt/
        shell: bash
        run: |
          ./wpt manifest

      - name: Generate list of tests
        shell: bash
        run: |
          ./mca.py wpt/MANIFEST.json ./expectation.json

      - name: Configure hosts file for WPT (unix)
        if: runner.os != 'Windows'
        working-directory: wpt/
        run: ./wpt make-hosts-file | sudo tee -a /etc/hosts

      - name: Configure hosts file for WPT (windows)
        if: runner.os == 'Windows'
        working-directory: wpt/
        run: python wpt make-hosts-file | Out-File $env:SystemRoot\System32\drivers\etc\hosts -Encoding ascii -Append

      - uses: MohamedRaslan/background_run_and_test@v1
        with:
          start: ./wpt/wpt serve &
          wait-on: 'http://web-platform.test:8000'
          command: |
            deno run -A ./wpt.js runtimes/${{ matrix.runtime }}.json
            echo "Finished tests"
      - uses: actions/upload-artifact@v6
        with:
          name: output-${{ matrix.runtime }}
          path: |
            wpt/MANIFEST.json
            expectation.json
            wpt.json
            wptreport.json

#      - name: Upload wpt results to wpt.fyi
