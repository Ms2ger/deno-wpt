# This CI job runs every night and tests all versions of Deno (canary and latest
# stable) across all OSes we support against the `epochs/daily` branch of WPT.

name: wpt_epoch2

on:
  #schedule:
    # Every night at 0:30 UTC. This is 20 minutes after `epochs/daily` branch is
    # triggered to be created in WPT repo.
  #  - cron: 30 0 * * *
  workflow_dispatch:
  push:

jobs:
  wpt:
    name: wpt / ${{ matrix.os }} / ${{ matrix.deno-version }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        deno-version: [latest,canary]
        #os: [ubuntu-24.04-xl]
        os: [ubuntu-24.04]

    steps:
      - name: Clone repository
        uses: actions/checkout@v6

      - name: Clone wpt
        uses: actions/checkout@v6
        with:
          repository: 'web-platform-tests/wpt'
          submodules: true
          persist-credentials: false
          path: wpt
          ref: mca-prep

      - name: Clone deno repository
        uses: actions/checkout@v6
        with:
          repository: 'denoland/deno'
          submodules: true
          persist-credentials: false
          path: deno

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ matrix.deno-version }}

      - uses: actions/setup-node@v6
        with:
          # Version Spec of the version to use in SemVer notation.
          # It also admits such aliases as lts/*, latest, nightly and canary builds
          # Examples: 12.x, 10.15.1, >=10.15.0, lts/Hydrogen, 16-nightly, latest, node
          node-version: latest

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Log versions
        run: |
          python --version
          node --version
          deno --version

      - name: Switch WPT submodule to epochs/daily
        working-directory: wpt/
        shell: bash
        run: |
          git remote set-branches origin '*'
          git fetch origin
          git checkout $(./wpt rev-list --epoch 1d)
          git checkout -b epochs/daily

      - name: Create MANIFEST.json
        working-directory: wpt/
        shell: bash
        run: |
          ./wpt manifest

      - name: Generate list of tests
        shell: bash
        run: |
          ./mca.py wpt/MANIFEST.json ./expectation.json

      - name: Configure hosts file for WPT (unix)
        if: runner.os != 'Windows'
        working-directory: wpt/
        run: ./wpt make-hosts-file | sudo tee -a /etc/hosts

      - name: Configure hosts file for WPT (windows)
        if: runner.os == 'Windows'
        working-directory: wpt/
        run: python wpt make-hosts-file | Out-File $env:SystemRoot\System32\drivers\etc\hosts -Encoding ascii -Append

      - uses: MohamedRaslan/background_run_and_test@v1
        with:
          start: ./wpt serve
          wait-on: 'http://web-platform.test:8000'
          command: |
          #deno run -A --lock=deno/tools/deno.lock.json --config=deno/tests/config/deno.json \
          #  ./deno/tests/wpt/wpt.ts setup
          deno run -A --lock=deno/tools/deno.lock.json --config=deno/tests/config/deno.json \
            ./wpt.js node
      - uses: actions/upload-artifact@v6
        with:
          name: output-${{ matrix.os }}-${{ matrix.deno-version }}
          path: |
            wpt/MANIFEST.json
            expectation.json
            wpt.json
            wptreport.json

#      - name: Upload wpt results to wpt.fyi
#        env:
#          WPT_FYI_USER: deno
#          WPT_FYI_PW: ${{ secrets.WPT_FYI_PW }}
#        run: |
#          deno run -A --lock=tools/deno.lock.json ./tools/upload_wptfyi.js wptreport.json --from-raw-file --daily-run
